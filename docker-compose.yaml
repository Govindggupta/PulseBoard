services:
  postgres:
    image: postgres:16-alpine
    container_name: pulseboard-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pulseboard}
      POSTGRES_USER: ${POSTGRES_USER:-pulseboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulseboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pulseboard} -d ${POSTGRES_DB:-pulseboard}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: